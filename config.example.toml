schema_version = 1
format_version = 2

[index]
directory = "./index"

[tokenizer]
id = "unicode_nfkc_casefold_v2"

[chunking]
max_chars = 1200
overlap_chars = 200

[vector]
enabled = false

[metadata]
filterable_fields = []

[daemon]
run_directory = "./run"
core_host = "127.0.0.1"
core_port = 18401
front_host = "127.0.0.1"
front_port = 18400
max_inflight = 4
max_inflight_bytes = 4194304
request_timeout_ms = 5000
