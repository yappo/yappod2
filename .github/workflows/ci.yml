name: CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "CMakeLists.txt"
      - "cmake/**"
      - "src/**"
      - "tests/**"
      - "examples/**"
      - "README.md"
      - "INSTALL"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "CMakeLists.txt"
      - "cmake/**"
      - "src/**"
      - "tests/**"
      - "examples/**"
      - "README.md"
      - "INSTALL"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: true
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libcmocka-dev libicu-dev libcurl4-openssl-dev libevent-dev

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          brew install cmocka icu4c libevent curl

      - name: Configure (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          set -o pipefail
          cmake --build build -j 2>&1 | tee build/build.log

      - name: Test
        id: ctest
        continue-on-error: true
        run: |
          set -o pipefail
          ctest --test-dir build --output-on-failure 2>&1 | tee build/ctest.log

      - name: Dump test logs on failure
        if: steps.ctest.outcome == 'failure'
        run: |
          echo "::group::ctest.log"
          cat build/ctest.log
          echo "::endgroup::"
          if [ -f build/Testing/Temporary/LastTest.log ]; then
            echo "::group::LastTest.log"
            cat build/Testing/Temporary/LastTest.log
            echo "::endgroup::"
          fi
          if [ -f build/Testing/Temporary/LastTestsFailed.log ]; then
            echo "::group::LastTestsFailed.log"
            cat build/Testing/Temporary/LastTestsFailed.log
            echo "::endgroup::"
          fi

      - name: Collect daemon logs on failure
        if: steps.ctest.outcome == 'failure'
        shell: bash
        run: |
          mkdir -p build/daemon-logs
          for base in "${RUNNER_TEMP}" "${TMPDIR:-/tmp}" "/tmp"; do
            [ -d "${base}" ] || continue
            while IFS= read -r f; do
              rel="${f#${base}/}"
              safe="$(echo "${rel}" | tr '/:' '__')"
              cp "${f}" "build/daemon-logs/${safe}"
            done < <(find "${base}" -type f \( -name "core.error" -o -name "front.error" -o -name "core.log" -o -name "front.log" \) -path "*yappod2-test-*" 2>/dev/null)
          done

      - name: Upload daemon logs artifact
        if: steps.ctest.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: daemon-logs-${{ matrix.os }}
          path: build/daemon-logs
          if-no-files-found: warn

      - name: Summarize logs
        if: always()
        shell: bash
        run: |
          {
            echo "### ${RUNNER_OS} build/test summary"
            if [ -f build/build.log ]; then
              echo ""
              echo "Build log tail:"
              echo '```text'
              tail -n 40 build/build.log
              echo '```'
            fi
            if [ -f build/ctest.log ]; then
              echo ""
              echo "CTest summary:"
              echo '```text'
              grep -E "Test +#|tests passed|tests failed|Total Test time" build/ctest.log || true
              echo '```'
              echo ""
              echo "Daemon port traces:"
              echo '```text'
              grep -F "[TEST] daemon attempt=" build/ctest.log || echo "(no daemon trace)"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce test success
        if: always()
        run: |
          if [ "${{ steps.ctest.outcome }}" != "success" ]; then
            echo "ctest failed"
            exit 1
          fi

      - name: Install
        if: steps.ctest.outcome == 'success'
        run: |
          cmake --install build --prefix "${RUNNER_TEMP}/yappod"

      - name: Install smoke test
        if: steps.ctest.outcome == 'success'
        shell: bash
        run: |
          PREFIX="${RUNNER_TEMP}/yappod"
          INDEX_DIR="$(mktemp -d)"
          trap 'rm -rf "${INDEX_DIR}"' EXIT

          rmdir "${INDEX_DIR}"
          "${PREFIX}/bin/yappo_makeindex" build \
            --config examples/config.toml \
            --input examples/documents.ndjson \
            --index "${INDEX_DIR}" >/dev/null
          "${PREFIX}/bin/search" \
            --index "${INDEX_DIR}" \
            --mode lexical \
            --query "modern search" | grep -q '"id":"doc-1"'

  wikipedia-search-web:
    name: wikipedia-search-web
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: examples/search-web

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: examples/search-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Production build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=moderate

  wikipedia-search-e2e:
    name: wikipedia-search-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install C dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libcmocka-dev libicu-dev libcurl4-openssl-dev libevent-dev

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: examples/search-web/package-lock.json

      - name: Build demo binaries
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j --target yappo_makeindex yappod_core yappod_front

      - name: Install Web dependencies
        working-directory: examples/search-web
        run: npm ci

      - name: Run integration E2E
        working-directory: examples/search-web
        run: npm run test:e2e

  build-and-test-sanitizer:
    name: ubuntu-latest (sanitizer)
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libcmocka-dev libicu-dev libcurl4-openssl-dev libevent-dev clang

      - name: Configure (sanitizer)
        run: |
          cmake -S . -B build-sanitizer \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DYAPPOD_BUILD_FUZZERS=ON \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_FLAGS="-O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build (sanitizer)
        run: |
          set -o pipefail
          cmake --build build-sanitizer -j 2>&1 | tee build-sanitizer/build.log

      - name: Test (sanitizer)
        id: ctest_sanitizer
        continue-on-error: true
        env:
          SANITIZER_LOG_DIR: ${{ github.workspace }}/build-sanitizer/sanitizer-logs
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=1:abort_on_error=1:log_path=${{ github.workspace }}/build-sanitizer/sanitizer-logs/asan
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1:log_path=${{ github.workspace }}/build-sanitizer/sanitizer-logs/ubsan
        run: |
          rm -rf build-sanitizer/sanitizer-logs
          mkdir -p build-sanitizer/sanitizer-logs
          set -o pipefail
          ctest --test-dir build-sanitizer --output-on-failure 2>&1 | tee build-sanitizer/ctest.log

      - name: Fuzz v2 parsers (sanitizer)
        id: fuzz_sanitizer
        continue-on-error: true
        env:
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=1:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          set -o pipefail
          {
            ./build-sanitizer/core_protocol_v2_fuzz \
              -runs=2000 -max_len=4096 tests/fuzz/corpus/core_protocol
            ./build-sanitizer/ingest_v2_fuzz \
              -runs=2000 -max_len=16384 tests/fuzz/corpus/ingest
          } 2>&1 | tee build-sanitizer/fuzz.log

      - name: Dump sanitizer logs on failure
        if: steps.ctest_sanitizer.outcome == 'failure' || steps.fuzz_sanitizer.outcome == 'failure'
        run: |
          echo "::group::ctest.log"
          cat build-sanitizer/ctest.log
          echo "::endgroup::"
          if [ -f build-sanitizer/Testing/Temporary/LastTest.log ]; then
            echo "::group::LastTest.log"
            cat build-sanitizer/Testing/Temporary/LastTest.log
            echo "::endgroup::"
          fi
          if [ -f build-sanitizer/Testing/Temporary/LastTestsFailed.log ]; then
            echo "::group::LastTestsFailed.log"
            cat build-sanitizer/Testing/Temporary/LastTestsFailed.log
            echo "::endgroup::"
          fi
          if compgen -G "build-sanitizer/sanitizer-logs/asan*" > /dev/null; then
            for f in build-sanitizer/sanitizer-logs/asan*; do
              echo "::group::$(basename "$f")"
              cat "$f"
              echo "::endgroup::"
            done
          fi
          if compgen -G "build-sanitizer/sanitizer-logs/ubsan*" > /dev/null; then
            for f in build-sanitizer/sanitizer-logs/ubsan*; do
              echo "::group::$(basename "$f")"
              cat "$f"
              echo "::endgroup::"
            done
          fi
          if [ -f build-sanitizer/fuzz.log ]; then
            echo "::group::fuzz.log"
            cat build-sanitizer/fuzz.log
            echo "::endgroup::"
          fi

      - name: Collect sanitizer daemon logs on failure
        if: steps.ctest_sanitizer.outcome == 'failure' || steps.fuzz_sanitizer.outcome == 'failure'
        shell: bash
        run: |
          mkdir -p build-sanitizer/daemon-logs
          for base in "${RUNNER_TEMP}" "${TMPDIR:-/tmp}" "/tmp"; do
            [ -d "${base}" ] || continue
            while IFS= read -r f; do
              rel="${f#${base}/}"
              safe="$(echo "${rel}" | tr '/:' '__')"
              cp "${f}" "build-sanitizer/daemon-logs/${safe}"
            done < <(find "${base}" -type f \( -name "core.error" -o -name "front.error" -o -name "core.log" -o -name "front.log" \) -path "*yappod2-test-*" 2>/dev/null)
          done

      - name: Upload sanitizer daemon logs artifact
        if: steps.ctest_sanitizer.outcome == 'failure' || steps.fuzz_sanitizer.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: daemon-logs-sanitizer
          path: build-sanitizer/daemon-logs
          if-no-files-found: warn

      - name: Summarize sanitizer logs
        if: always()
        shell: bash
        run: |
          {
            echo "### ubuntu-latest sanitizer summary"
            if [ -f build-sanitizer/build.log ]; then
              echo ""
              echo "Build log tail:"
              echo '```text'
              tail -n 40 build-sanitizer/build.log
              echo '```'
            fi
            if [ -f build-sanitizer/ctest.log ]; then
              echo ""
              echo "CTest summary:"
              echo '```text'
              grep -E "Test +#|tests passed|tests failed|Total Test time" build-sanitizer/ctest.log || true
              echo '```'
              echo ""
              echo "Daemon port traces:"
              echo '```text'
              grep -F "[TEST] daemon attempt=" build-sanitizer/ctest.log || echo "(no daemon trace)"
              echo '```'
            fi
            if [ -f build-sanitizer/fuzz.log ]; then
              echo ""
              echo "Fuzz summary:"
              echo '```text'
              tail -n 40 build-sanitizer/fuzz.log
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce sanitizer test success
        if: always()
        run: |
          if [ "${{ steps.ctest_sanitizer.outcome }}" != "success" ] || \
             [ "${{ steps.fuzz_sanitizer.outcome }}" != "success" ]; then
            echo "sanitizer ctest or fuzzing failed"
            exit 1
          fi
