schema_version = 1
format_version = 2

[index]
directory = "../data/local-files/yappod2-index"

[tokenizer]
id = "unicode_nfkc_casefold_v2"

[chunking]
max_chars = 1200
overlap_chars = 200

[vector]
enabled = false

[metadata]
filterable_fields = ["collection_id", "source_path", "source_mime", "extractor"]

[daemon]
run_directory = "../data/search-web/run"
core_host = "127.0.0.1"
core_port = 18401
front_host = "127.0.0.1"
front_port = 18400
max_inflight = 4
max_inflight_bytes = 4194304
request_timeout_ms = 5000
# 文書登録を認証する場合だけ16文字以上のtokenを設定します。
# write_token = "replace-with-16-or-more-characters"

[web]
host = "127.0.0.1"
port = 4173
yappod_timeout_ms = 5000

# 回答生成を使う場合だけ有効にします。
# [llm]
# base_url = "http://127.0.0.1:1234/v1"
# model = "model-identifier"
# effort = "low"
# timeout_ms = 30000
# authorization_token_env = "LLM_API_KEY"

# vector/hybrid検索を使う場合だけ有効にします。index生成側も同じsectionを読みます。
# [embedding]
# directory = "../data/local-files/vectors"
# provider = "lmstudio" # lmstudio | ollama | openai
# base_url = "http://127.0.0.1:1234/v1"
# model = "embedding-model-identifier"
# model_id = "embeddinggemma-300m-768-local-v1"
# dimensions = 768
# prompt_profile = "embeddinggemma"
# timeout_ms = 60000
# batch_size = 16
# authorization_token_env = "EMBEDDING_API_KEY"

[usage_log]
path = "../data/search-web/api-usage.jsonl"
