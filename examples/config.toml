format_version = 2

[index]
directory = "./index"

[tokenizer]
id = "unicode_nfkc_cf_v1"

[chunking]
max_chars = 512
overlap_chars = 64

[vector]
enabled = true
model_id = "example-3d-v1"
dimensions = 3
metric = "cosine"

[metadata]
filterable_fields = ["category", "language"]

[daemon]
run_directory = "./run"
core_host = "127.0.0.1"
core_port = 18401
front_host = "127.0.0.1"
front_port = 18400
max_inflight = 4
max_inflight_bytes = 4194304
request_timeout_ms = 5000
