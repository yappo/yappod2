schema_version = 1
format_version = 2
collection_id = "my-files"

[index]
directory = "../data/local-files/index"

[tokenizer]
id = "unicode_nfkc_casefold_v2"

[chunking]
max_chars = 1200
overlap_chars = 200

[vector]
enabled = false

[metadata]
filterable_fields = ["collection_id", "source_path", "source_mime", "extractor"]

[input]
root = "./input"
include = ["*", "**/*"]
exclude = [
  ".git/**",
  ".venv/**",
  "__pycache__/**",
  "data/**",
]
follow_symlinks = false

[output]
directory = "../data/local-files/documents"
shard_max_bytes = 67108864
body_max_bytes = 1000000

# このfileは設定項目のsampleです。copyして入力・出力pathを変更して使います。
# `rag`/`hybrid`では[prepare]、`hybrid`では[embedding]も有効にします。
# [prepare]
# directory = "../data/local-files/passages"
#
# [embedding]
# directory = "../data/local-files/vectors"
# provider = "lmstudio" # lmstudio | ollama | openai
# base_url = "http://127.0.0.1:1234/v1"
# endpoint_url = "https://api.openai.com/v1/embeddings" # base_urlとは排他
# model = "replace-with-embedding-model"
# model_id = "local-files-embedding-768-v1"
# dimensions = 768
# batch_size = 16
# timeout_ms = 60000
# prompt_profile = "plain" # plain | embeddinggemma
# authorization_token_env = "EMBEDDING_API_KEY"
#
[usage_log]
path = "../data/local-files/api-usage.jsonl"

[build]
yappo_makeindex = "../../build/yappo_makeindex"

[daemon]
run_directory = "../data/local-files/run"
core_host = "127.0.0.1"
core_port = 18401
front_host = "127.0.0.1"
front_port = 18400
max_inflight = 4
max_inflight_bytes = 4194304
request_timeout_ms = 5000
# write_token = "replace-with-16-or-more-characters"

[web]
host = "127.0.0.1"
port = 4173
yappod_timeout_ms = 5000

# 回答生成を使う場合だけ追加します。
# [llm]
# base_url = "http://127.0.0.1:1234/v1"
# model = "model-identifier"
# timeout_ms = 30000
# authorization_token_env = "LLM_API_KEY"

[extract]
enable_plugins = false
max_extracted_bytes = 67108864
tika_timeout_ms = 30000
# Tikaは自動downloadしません。iWorkや旧Office形式が必要な場合だけ設定します。
# tika_command = ["java", "-jar", "/absolute/path/to/tika-app-3.3.1.jar", "--text", "{path}"]

[formatters]
enabled = true
content_match_enabled = false
content_scan_bytes = 1048576

# path条件だけで独自整形scriptを実行する例です。
# [[formatters.rules]]
# name = "dockerfile"
# basename_glob = ["Dockerfile"]
# command = ["python3", "./tools/format_dockerfile.py", "{path}"]
# timeout_ms = 30000
# max_stdout_bytes = 67108864

# path条件を満たしたfileだけ、先頭1 MiBの内容も調べる例です。
# [[formatters.rules]]
# name = "special-c-source"
# path_glob = ["src/**/*.c"]
# content_regex = ["(?m)^SPECIAL_FORMAT="]
# command = ["python3", "./tools/format_special.py", "{path}"]
# timeout_ms = 30000
# max_stdout_bytes = 67108864
