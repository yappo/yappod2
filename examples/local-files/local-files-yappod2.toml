schema_version = 1
collection_id = "yappod2-source"

[input]
# This file lives in examples/local-files, so ../.. is the repository root.
root = "../.."
include = ["*", "**/*"]
exclude = [
  ".git/**",
  ".idea/**",
  ".vscode/**",
  ".DS_Store",
  "**/.DS_Store",
  "build/**",
  "build_*/**",
  ".venv/**",
  "**/.deps/**",
  "**/__pycache__/**",
  "**/node_modules/**",
  "examples/local-files/data/**",
  "examples/wikipedia-search/index/**",
  "examples/wikipedia-search/data/**",
]
follow_symlinks = false

[output]
directory = "./data/yappod2-documents"
shard_max_bytes = 67108864
body_max_bytes = 1000000

[prepare]
directory = "./data/yappod2-passages"

[embedding]
directory = "./data/yappod2-vectors"
provider = "lmstudio"
base_url = "http://127.0.0.1:1234/v1"
model = "text-embedding-embeddinggemma-300m"
model_id = "embeddinggemma-300m-768-local-v1"
dimensions = 768
batch_size = 16
timeout_ms = 60000
prompt_profile = "embeddinggemma"

[usage_log]
path = "./data/api-usage.jsonl"

[build]
yappo_makeindex = "../../build/yappo_makeindex"
index_config = "./config.lexical.toml"
hybrid_index_config = "./config.hybrid.toml"
index_directory = "./data/yappod2-index"

[extract]
max_extracted_bytes = 67108864
enable_plugins = false
tika_timeout_ms = 30000

[formatters]
enabled = true
content_match_enabled = false
content_scan_bytes = 1048576
