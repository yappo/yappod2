schema_version = 1
format_version = 2
collection_id = "yappod2-source"

[index]
directory = "../data/local-files/yappod2-index"

[tokenizer]
id = "unicode_nfkc_casefold_v2"

[chunking]
max_chars = 1200
overlap_chars = 200

[vector]
enabled = false

[metadata]
filterable_fields = ["collection_id", "source_path", "source_mime", "extractor"]

[input]
# This file lives in examples/local-files, so ../.. is the repository root.
root = "../.."
include = ["*", "**/*"]
exclude = [
  ".git/**",
  ".idea/**",
  ".vscode/**",
  ".DS_Store",
  "**/.DS_Store",
  "build/**",
  "build_*/**",
  ".venv/**",
  "**/.deps/**",
  "**/__pycache__/**",
  "**/node_modules/**",
  "examples/data/**",
]
follow_symlinks = false

[output]
directory = "../data/local-files/yappod2-documents"
shard_max_bytes = 67108864
body_max_bytes = 1000000

[prepare]
directory = "../data/local-files/yappod2-passages"

[embedding]
directory = "../data/local-files/yappod2-vectors"
provider = "lmstudio"
base_url = "http://127.0.0.1:1234/v1"
model = "text-embedding-embeddinggemma-300m"
model_id = "embeddinggemma-300m-768-local-v1"
dimensions = 768
batch_size = 16
timeout_ms = 60000
prompt_profile = "embeddinggemma"

[usage_log]
path = "../data/local-files/api-usage.jsonl"

[build]
yappo_makeindex = "../../build/yappo_makeindex"

[daemon]
run_directory = "../data/local-files/run"
core_host = "127.0.0.1"
core_port = 18401
front_host = "127.0.0.1"
front_port = 18400
max_inflight = 4
max_inflight_bytes = 4194304
request_timeout_ms = 5000
# write_token = "replace-with-16-or-more-characters"

[web]
host = "127.0.0.1"
port = 4173
yappod_timeout_ms = 5000

[extract]
max_extracted_bytes = 67108864
enable_plugins = false
tika_timeout_ms = 30000

[formatters]
enabled = true
content_match_enabled = false
content_scan_bytes = 1048576
